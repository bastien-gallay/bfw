name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - name: Assert tag matches plugin.json version
        run: |
          manifest=$(jq -r .version .claude-plugin/plugin.json)
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$manifest" != "$tag" ]]; then
            echo "tag $tag ≠ plugin.json $manifest" >&2
            exit 1
          fi

      - name: Check manifest versions are aligned
        run: just check-versions

      - name: Build skill zip
        run: just package

      - name: Extract CHANGELOG section
        run: |
          awk -v v="$GITHUB_REF_NAME" '
            $0 ~ "^## "v {flag=1; next}
            /^## / && flag {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/notes.md
          if [[ ! -s /tmp/notes.md ]]; then
            echo "CHANGELOG.md has no section for $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Create GitHub Release with .skill asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md \
            dist/bfw-brainstorm-v*.skill
